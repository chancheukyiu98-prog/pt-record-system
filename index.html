<script src="https://cloudflare.com"></script>
<script>
    // 🌐 1. 雲端連線設定（最優先初始化）
    const SUPABASE_URL = "https://supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_n1yE6KcuaA7CC5agZc1rPA_FfmzDYGq"; // ⚠️ 請記得在這裡貼上您的 Publishable key
    
    // 修正大小寫：使用大寫的 Supabase.createClient
    const supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // 👑 2. 雙管理員帳號與密碼對照表（移到最上方防止讀取不到）
    const ADMIN_ACCOUNTS = {
        "lau": "okok7890",
        "cherus": "okok7890"
    };

    let loginSessionUser = null; 

    const leftJobs = [
        {id:1, name:"取貨", t:4, q:0, b:"bg-dark"}, {id:2, name:"出貨", t:4, q:0, b:"bg-light"},
        {id:3, name:"箱類處理", t:3, q:1, b:"bg-dark"}, {id:4, name:"出貨準備", t:5, q:0, b:"bg-light"},
        {id:5, name:"預貨", t:2, q:0, b:"bg-dark"}
    ];
    const rightJobs = [
        {id:6, name:"貼QR", t:3, q:1, b:"bg-light"}, {id:7, name:"貨架整理", t:3, q:0, b:"bg-dark"},
        {id:8, name:"點倉", t:3, q:0, b:"bg-light"}, {id:9, name:"點貨", t:3, q:1, b:"bg-dark"},
        {id:10, name:"外出", t:2, q:0, b:"bg-light"}
    ];

    window.onload = () => {
        const saved = localStorage.getItem('team_user_session');
        if(saved) {
            loginSessionUser = JSON.parse(saved);
            initApp();
        }
    };

    function showRegisterUI() {
        document.getElementById('loginArea').style.display = "none";
        document.getElementById('registerArea').style.display = "block";
    }
    function showLoginUI() {
        document.getElementById('registerArea').style.display = "none";
        document.getElementById('loginArea').style.display = "block";
    }

    // 🔒 登入驗證
    async function handleLogin() {
        const id = document.getElementById('loginID').value.trim();
        const pwd = document.getElementById('loginPwd').value.trim();
        if(!id || !pwd) return alert("請輸入帳號與密碼！");

        // 1. 優先比對是否為指定的兩個 Admin 帳號
        const lowID = id.toLowerCase();
        if(ADMIN_ACCOUNTS[lowID] && ADMIN_ACCOUNTS[lowID] === pwd) {
            loginSessionUser = { id: id.toUpperCase(), name: lowID === "lau" ? "LAU主管" : "Cherus主管", role: "admin" };
            localStorage.setItem('team_user_session', JSON.stringify(loginSessionUser));
            initApp();
            return;
        }

        // 2. 一般員工去雲端 staff_users 驗證
        const { data, error } = await supabaseClient
            .from('staff_users')
            .select('*')
            .eq('staff_id', id)
            .eq('staff_pwd', pwd)
            .single();

        if (error || !data) {
            alert("❌ 登入失敗：工號或密碼不正確！\n(請聯繫 LAU 或 Cherus 為您註冊新帳號)");
        } else {
            loginSessionUser = { id: data.staff_id, name: data.staff_name, role: "user" };
            localStorage.setItem('team_user_session', JSON.stringify(loginSessionUser));
            initApp();
        }
    }

    // 🛠️ 生產新用戶 (需輸入任一管理員密碼驗證)
    async function handleCreateUser() {
        const regID = document.getElementById('regID').value.trim();
        const regName = document.getElementById('regName').value.trim();
        const regPwd = document.getElementById('regPwd').value.trim();
        const verify = document.getElementById('adminVerifyPwd').value.trim();

        if(!regID || !regName || !regPwd) return alert("請填寫完整的新員工帳號欄位！");
        if(verify !== "okok7890") return alert("❌ 驗證失敗：管理員通行密碼不正確，無法生產用戶！");

        const { error } = await supabaseClient
            .from('staff_users')
            .insert([{ staff_id: regID, staff_name: regName, staff_pwd: regPwd }]);

        if (error) {
            alert("❌ 註冊失敗：工號可能已經存在！\n原因: " + error.message);
        } else {
            alert(`🎉 成功生產用戶！\n員工 [${regID}] ${regName} 已經可以立刻登入。`);
            showLoginUI();
            document.getElementById('regID').value = "";
            document.getElementById('regName').value = "";
            document.getElementById('regPwd').value = "";
            document.getElementById('adminVerifyPwd').value = "";
        }
    }

    function handleLogout() {
        localStorage.removeItem('team_user_session');
        location.reload();
    }

    function initApp() {
        document.getElementById('loginArea').style.display = "none";
        document.getElementById('registerArea').style.display = "none";
        document.getElementById('mainArea').style.display = "block";
        
        document.getElementById('idLabel').innerText = loginSessionUser.id;
        document.getElementById('nameLabel').innerText = loginSessionUser.name;
        document.getElementById('workDate').valueAsDate = new Date();

        if(loginSessionUser.role === "admin") {
            document.getElementById('roleLabel').innerText = "(管理員)";
            document.getElementById('inputSideUI').style.display = "none"; 
            document.getElementById('recordTitle').innerText = "📊 全體員工雲端紀錄明細";
            document.getElementById('footerButtons').innerHTML = `
                <button class="btn-act" style="background:#27ae60" onclick="exportAllAdmin()">📤 匯出全體大集合 JSON 文件</button>
                <button class="btn-act" style="background:#95a5a6" onclick="clearAllAdmin()">🗑️ 刪除雲端所有數據 (慎用)</button>
            `;
            fetchAllRecordsAdmin();
        } else {
            document.getElementById('roleLabel').innerText = "";
            document.getElementById('colL').innerHTML = "";
            document.getElementById('colR').innerHTML = "";
            leftJobs.forEach(j => document.getElementById('colL').innerHTML += makeCard(j));
            rightJobs.forEach(j => document.getElementById('colR').innerHTML += makeCard(j));
            document.getElementById('footerButtons').innerHTML = `
                <button class="btn-act" style="background:#3498db" onclick="saveDayCloud()">💾 上傳儲存至雲端</button>
            `;
            fetchMyRecords();
        }
    }

    function handleTimeInput(el) {
        if (el.value && !el.value.includes(':')) { }
        else if (el.value && el.value.split(':').length < 2) el.value += ":00";
        calc();
    }

    function makeCard(j) {
        let h = `<div class="job-card"><div class="job-title ${j.b}">${j.id}. ${j.name}</div>`;
        if(j.q) h += `<div class="qty-row">數量：<input type="number" class="q-${j.id}" id="q-${j.id}"></div>`;
        h += `<div class="table-responsive"><table class="time-table">`;
        for(let i=0; i<j.t; i++){
            h += `<tr><td><input type="time" class="s-${j.id}" onblur="handleTimeInput(this)"></td>
                      <td><input type="time" class="e-${j.id}" onblur="handleTimeInput(this)"></td></tr>`;
        }
        return h + `</table></div></div>`;
    }

    function calc() {
        if(loginSessionUser.role === "admin") return;
        let total = 0;
        [...leftJobs, ...rightJobs].forEach(j => {
            const ss = document.querySelectorAll(`.s-${j.id}`), es = document.querySelectorAll(`.e-${j.id}`);
            ss.forEach((s, i) => {
                if(s.value && es[i].value) total += (new Date("1970/01/01 "+es[i].value) - new Date("1970/01/01 "+s.value))/3600000;
            });
        });
        document.getElementById('displayTotal').innerText = Math.max(0, total).toFixed(2);
    }

    async function saveDayCloud() {
        const date = document.getElementById('workDate').value;
        let dayData = [];
        let totalMin = 0;

        [...leftJobs, ...rightJobs].forEach(j => {
            const qty = j.q ? document.getElementById(`q-${j.id}`).value : null;
            const ss = document.querySelectorAll(`.s-${j.id}`), es = document.querySelectorAll(`.e-${j.id}`);
            let times = [];
            ss.forEach((s, i) => { 
                if(s.value && es[i].value) {
                    times.push({s: s.value, e: es[i].value});
                    totalMin += (new Date("1970/01/01 "+es[i].value) - new Date("1970/01/01 "+s.value))/60000;
                }
            });
            if(times.length > 0 || qty) dayData.push({ job: j.name, qty, times });
        });
        
        if(dayData.length === 0) return alert("請先輸入數據再儲存！");
        const hoursCalculated = (totalMin / 60).toFixed(2);

        const { data, error } = await supabaseClient
            .from('work_records')
            .insert([
                { staff_id: loginSessionUser.id, staff_name: loginSessionUser.name, work_date: date, hours: hoursCalculated, details: dayData }
            ]);

        if (error) alert("❌ 雲端儲存失敗：" + error.message);
        else { alert("💾 數據已成功同步到雲端後台！"); location.reload(); }
    }

    async function fetchMyRecords() {
        const { data, error } = await supabaseClient
            .from('work_records')
            .select('*')
            .eq('staff_id', loginSessionUser.id)
            .order('work_date', { ascending: false });

        if (error) return console.error(error);
        const box = document.getElementById('historyBox');
        box.innerHTML = "";
        data.forEach(row => {
            box.innerHTML += `<div class="history-item">
                <button class="btn-del" onclick="deleteRecordCloud(${row.id})">刪除</button>
                <strong>${row.work_date}</strong> | <span style="color:#2980b9; font-weight:bold;">${row.hours}h</span>
                <div style="font-size:0.8rem; color:#666; margin-top:4px;">${row.details.map(d => d.job).join(', ')}</div>
            </div>`;
        });
    }

    async function deleteRecordCloud(rowId) {
        if(!confirm("確定要從雲端刪除這筆紀錄嗎？")) return;
        const { error } = await supabaseClient.from('work_records').delete().eq('id', rowId);
        if(error) alert("刪除失敗：" + error.message);
        else fetchMyRecords();
    }

    async function fetchAllRecordsAdmin() {
        const { data, error } = await supabaseClient
            .from('work_records')
            .select('*')
            .order('work_date', { ascending: false });

        if (error) return alert("載入雲端數據失敗：" + error.message);
        const box = document.getElementById('historyBox');
        box.innerHTML = "";
        data.forEach(row => {
            box.innerHTML += `<div class="history-item">
                <button class="btn-del" onclick="deleteRecordAdmin(${row.id})">刪</button>
                <strong>${row.work_date}</strong> - [${row.staff_id}] ${row.staff_name} | <b>${row.hours}h</b>
                <div style="font-size:0.8rem; color:#555; margin-top:4px;">項目: ${row.details.map(d => d.job + (d.qty?`(${d.qty}件)`:'')).join(', ')}</div>
            </div>`;
        });
        window.adminLoadedData = data;
    }

    async function deleteRecordAdmin(rowId) {
        if(!confirm("身為 Admin，您確定要強行刪除此員工的這筆紀錄嗎？")) return;
        const { error } = await supabaseClient.from('work_records').delete().eq('id', rowId);
        if(error) alert(error.message);
        else fetchAllRecordsAdmin();
    }

    function exportAllAdmin() {
        if(!window.adminLoadedData || window.adminLoadedData.length === 0) return alert("目前沒有任何雲端數據可導出！");
        const payload = JSON.stringify({ exportTime: new Date().toLocaleString(), totalRecordsCount: window.adminLoadedData.length, allStaffRecords: window.adminLoadedData }, null, 2);
        const blob = new Blob([payload], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `全體員工工時大集合資料庫_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    async function clearAllAdmin() {
        if(confirm("❗❗ 警告 ❗❗\n您正在執行清空全團隊資料庫操作！這會刪除全體員工所有的雲端數據！確定繼續？")) {
            if(confirm("請再次確認：此操作無法復原！")) {
                const { error } = await supabaseClient.from('work_records').delete().neq('id', 0);
                if(error) alert(error.message);
                else location.reload();
            }
        }
    }
</script>
</body>
</html>
